name: Build Extension

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build and upload artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-accessibility-auditor
          path: dist/
          if-no-files-found: error
          retention-days: 90

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r "../site-accessibility-auditor-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: site-accessibility-auditor-*.zip
          generate_release_notes: true
          body: |
            ## Manual installation

            1. Download the `site-accessibility-auditor-*.zip` file below and extract it.
            2. Open `chrome://extensions` in Chrome and enable **Developer mode** (top right).
            3. Click **Load unpacked** and select the extracted folder.
            4. Open DevTools on any page — the auditor panels appear as new DevTools tabs.
