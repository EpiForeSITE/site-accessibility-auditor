<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Static Form Fixture</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				margin: 2rem;
			}
			.toolbar button {
				width: 22px;
				height: 22px;
				margin-right: 0.5rem;
			}
			.bad-tabs [tabindex='3'] {
				margin-right: 0.5rem;
			}
			.label-dot {
				display: inline-block;
				width: 12px;
				height: 12px;
				border-radius: 50%;
				background: #16a34a;
			}
		</style>
	</head>
	<body>
		<h1>Static Form Fixture</h1>
		<div class="toolbar">
			<button aria-label="Close">×</button>
			<button aria-label="Pin">•</button>
		</div>
		<div class="bad-tabs">
			<button tabindex="3">First in DOM, third in tab order</button>
			<button tabindex="1">Second in DOM, first in tab order</button>
		</div>
		<p>Status: <span class="label-dot"></span> success relies on color only.</p>
	</body>
</html>
