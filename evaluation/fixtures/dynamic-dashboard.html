<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Dynamic Dashboard Fixture</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				margin: 2rem;
			}
			dialog {
				border: 1px solid #ccc;
				padding: 1rem 1.25rem;
			}
			.panel {
				margin-top: 1rem;
				border: 1px solid #d4d4d8;
				padding: 1rem;
			}
			.hidden {
				display: none;
			}
		</style>
	</head>
	<body>
		<h1>Dynamic Dashboard Fixture</h1>
		<button id="open-dialog" onclick="document.getElementById('dialog').showModal()">
			Open dialog
		</button>
		<button aria-expanded="false" aria-controls="filters" onclick="toggleFilters(this)">
			Toggle filters
		</button>
		<div id="filters" class="panel hidden">
			<button style="width: 23px; height: 23px" aria-label="Remove filter">×</button>
			<a href="#details" onclick="document.getElementById('details').classList.toggle('hidden')"
				>Reveal details</a
			>
		</div>
		<div id="details" class="panel hidden">
			Details panel opened through a disclosure interaction.
		</div>
		<dialog id="dialog">
			<p>Dialog body without explicit focus management.</p>
			<button onclick="document.getElementById('dialog').close()">Close dialog</button>
		</dialog>
		<script>
			function toggleFilters(button) {
				const panel = document.getElementById('filters');
				const next = panel.classList.toggle('hidden');
				button.setAttribute('aria-expanded', String(!next));
			}
		</script>
	</body>
</html>
