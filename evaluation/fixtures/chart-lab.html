<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Chart Lab Fixture</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				margin: 2rem;
			}
			.legend {
				display: flex;
				gap: 1rem;
				margin-top: 0.75rem;
			}
			.legend span::before {
				content: '';
				display: inline-block;
				width: 10px;
				height: 10px;
				margin-right: 0.35rem;
				border-radius: 50%;
			}
			.legend .a::before {
				background: #2563eb;
			}
			.legend .b::before {
				background: #f59e0b;
			}
			.legend .c::before {
				background: #10b981;
			}
		</style>
	</head>
	<body>
		<h1>Chart Lab Fixture</h1>
		<figure>
			<svg width="420" height="220" viewBox="0 0 420 220" role="img">
				<rect x="40" y="90" width="60" height="110" fill="#2563eb"></rect>
				<rect x="150" y="60" width="60" height="140" fill="#f59e0b"></rect>
				<rect x="260" y="20" width="60" height="180" fill="#10b981"></rect>
			</svg>
			<div class="legend">
				<span class="a">North</span>
				<span class="b">South</span>
				<span class="c">West</span>
			</div>
		</figure>
		<canvas width="320" height="180" aria-label=""></canvas>
	</body>
</html>
